map_merger:
  ros__parameters:
    use_sim_time: true

    map1_topic: /robot1/map
    map2_topic: /robot2/map
    merged_map_topic: /merged_map
    merged_frame_id: map

    robot1_initial_x: -2.0
    robot1_initial_y: 0.0
    robot1_initial_yaw: 0.0

    robot2_initial_x: 2.0
    robot2_initial_y: 0.0
    robot2_initial_yaw: 0.0

    resolution: 0.05
    merge_rate_hz: 1.0
    require_both_maps: true
